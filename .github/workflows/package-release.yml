name: package-release

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      desktop_version:
        description: 'Optional Desktop release selector. Defaults to the latest eligible Windows Desktop release.'
        required: false
        type: string
      server_version:
        description: 'Optional Server release selector. Defaults to the latest eligible Windows Server release.'
        required: false
        type: string
      force_rebuild:
        description: 'Continue even when the derived Store release tag already exists.'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Build and stage release metadata without publishing to GitHub Releases.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

env:
  RESOLVED_BUILD_PLAN_ARTIFACT_NAME: resolved-build-plan
  DESKTOP_AZURE_SAS_URL: ${{ secrets.desktop_azure_sas_url || secrets.WIN_STORE_PACKER_DESKTOP_AZURE_SAS_URL || secrets.DESKTOP_AZURE_SAS_URL }}
  SERVER_AZURE_SAS_URL: ${{ secrets.server_azure_sas_url || secrets.WIN_STORE_PACKER_SERVER_AZURE_SAS_URL || secrets.SERVER_AZURE_SAS_URL || secrets.SERVICE_AZURE_SAS_URL }}
  MICROSOFT_STORE_PRODUCT_ID: ${{ vars.MICROSOFT_STORE_PRODUCT_ID || secrets.MICROSOFT_STORE_PRODUCT_ID }}
  HAGISCRIPT_INSTALL_SPEC: '@hagicode/hagiscript@0.2.3'

jobs:
  resolve_plan:
    name: Resolve build plan
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      platform_matrix: ${{ steps.resolve.outputs.platform_matrix }}
    steps:
      - name: Checkout win_store_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install global hagiscript
        shell: bash
        run: |
          npm install -g "$HAGISCRIPT_INSTALL_SPEC"

          npm_prefix="$(npm config get prefix)"
          if [ "$RUNNER_OS" = 'Windows' ]; then
            echo "$npm_prefix" >> "$GITHUB_PATH"
            export PATH="$npm_prefix:$PATH"
          else
            echo "$npm_prefix/bin" >> "$GITHUB_PATH"
            export PATH="$npm_prefix/bin:$PATH"
          fi

          hagiscript --version

      - name: Resolve build plan
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WIN_STORE_PACKER_DESKTOP_AZURE_SAS_URL: ${{ env.DESKTOP_AZURE_SAS_URL }}
          WIN_STORE_PACKER_SERVER_AZURE_SAS_URL: ${{ env.SERVER_AZURE_SAS_URL }}
        run: |
          mkdir -p "$RUNNER_TEMP/build-plan"
          node scripts/resolve-dispatch-build-plan.mjs \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$GITHUB_EVENT_PATH" \
            --output "$RUNNER_TEMP/build-plan/build-plan.json"

      - name: Validate build plan
        id: resolve
        shell: bash
        run: |
          node scripts/resolve-release-plan.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json"

      - name: Upload resolved build plan
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan/build-plan.json
          if-no-files-found: error

  prepare_release:
    name: Prepare release
    needs: resolve_plan
    if: needs.resolve_plan.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout win_store_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download resolved build plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan

      - name: Ensure GitHub release exists
        if: needs.resolve_plan.outputs.dry_run != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/ensure-release.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --output-dir "$RUNNER_TEMP/release-bootstrap"

      - name: Record dry-run skip
        if: needs.resolve_plan.outputs.dry_run == 'true'
        shell: bash
        run: |
          {
            echo '## win_store_packer release preparation skipped'
            echo
            echo '- dry_run: true'
            echo '- GitHub Release pre-creation is skipped in dry-run mode.'
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ matrix.target.platform }} ${{ matrix.variant }}
    needs:
      - resolve_plan
      - prepare_release
    if: needs.resolve_plan.outputs.should_build == 'true'
    permissions:
      contents: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.resolve_plan.outputs.platform_matrix).include }}
        variant:
          - unsigned
          - signed
    runs-on: ${{ matrix.target.runner }}
    steps:
      - name: Checkout win_store_packer
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout hagicode-desktop input
        uses: actions/checkout@v5
        with:
          repository: HagiCode-org/desktop
          path: inputs/hagicode-desktop
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install global hagiscript
        shell: bash
        run: |
          npm install -g "$HAGISCRIPT_INSTALL_SPEC"

          npm_prefix="$(npm config get prefix)"
          if [ "$RUNNER_OS" = 'Windows' ]; then
            echo "$npm_prefix" >> "$GITHUB_PATH"
            export PATH="$npm_prefix:$PATH"
          else
            echo "$npm_prefix/bin" >> "$GITHUB_PATH"
            export PATH="$npm_prefix/bin:$PATH"
          fi

          hagiscript --version

      - name: Download resolved build plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan

      - name: Set build variables
        shell: bash
        run: |
          if [ "${{ matrix.variant }}" = 'signed' ]; then
            echo "STORE_WORKSPACE=$RUNNER_TEMP/store-release-${{ matrix.target.platform }}-signed" >> "$GITHUB_ENV"
            echo "STORE_SIGNING_MODE=required" >> "$GITHUB_ENV"
            echo "STORE_REQUIRE_SIGNED=true" >> "$GITHUB_ENV"
          else
            echo "STORE_WORKSPACE=$RUNNER_TEMP/store-release-${{ matrix.target.platform }}-unsigned" >> "$GITHUB_ENV"
            echo "STORE_SIGNING_MODE=disabled" >> "$GITHUB_ENV"
            echo "STORE_REQUIRE_SIGNED=false" >> "$GITHUB_ENV"
          fi



      - name: Prepare tagged desktop workspace
        shell: bash
        run: |
          node scripts/prepare-packaging-workspace.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.target.platform }}" \
            --workspace "$STORE_WORKSPACE" \
            --desktop-source "$GITHUB_WORKSPACE/inputs/hagicode-desktop"

      - name: Download and inject server payload
        shell: bash
        env:
          WIN_STORE_PACKER_SERVER_AZURE_SAS_URL: ${{ env.SERVER_AZURE_SAS_URL }}
        run: |
          node scripts/stage-server-payload.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.target.platform }}" \
            --workspace "$STORE_WORKSPACE"

      - name: Build AppX
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || secrets.CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || secrets.TENANT_ID || secrets.AZURE_AD_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET || secrets.CLIENT_SECRET || secrets.AZURE_AD_APPLICATION_SECRET }}
          AZURE_CODESIGN_ENDPOINT: ${{ vars.AZURE_CODESIGN_ENDPOINT || secrets.AZURE_CODESIGN_ENDPOINT }}
          AZURE_CODESIGN_ACCOUNT_NAME: ${{ vars.AZURE_CODESIGN_ACCOUNT_NAME || secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME || secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
        run: |
          node scripts/build-appx.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.target.platform }}" \
            --workspace "$STORE_WORKSPACE" \
            --artifact-variant "${{ matrix.variant }}" \
            --signing-mode "$STORE_SIGNING_MODE"

      - name: Finalize AppX variant metadata
        shell: bash
        run: |
          args=(
            --workspace "$STORE_WORKSPACE"
            --platform "${{ matrix.target.platform }}"
            --artifact-variant "${{ matrix.variant }}"
          )

          if [ "$STORE_REQUIRE_SIGNED" = 'true' ]; then
            args+=(--require-signed)
          fi

          node scripts/finalize-appx-signing.mjs \
            "${args[@]}"

      - name: Upload variant assets to release
        if: needs.resolve_plan.outputs.dry_run != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/upload-release-assets.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --artifacts-dir "$STORE_WORKSPACE" \
            --output-dir "$RUNNER_TEMP/release-upload-${{ matrix.target.platform }}-${{ matrix.variant }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: store-package-${{ matrix.target.platform }}-${{ matrix.variant }}
          path: |
            ${{ env.STORE_WORKSPACE }}/artifact-inventory-${{ matrix.target.platform }}-${{ matrix.variant }}.json
            ${{ env.STORE_WORKSPACE }}/build-metadata-${{ matrix.target.platform }}-${{ matrix.variant }}.json
            ${{ env.STORE_WORKSPACE }}/payload-validation-${{ matrix.target.platform }}.json
            ${{ env.STORE_WORKSPACE }}/workspace-validation-${{ matrix.target.platform }}.json
            ${{ env.STORE_WORKSPACE }}/release-assets
            ${{ runner.temp }}/release-upload-${{ matrix.target.platform }}-${{ matrix.variant }}
          if-no-files-found: error

  publish:
    name: Publish release
    needs:
      - resolve_plan
      - build
    if: needs.resolve_plan.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout win_store_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download resolved build plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: store-package-*
          merge-multiple: true
          path: ${{ runner.temp }}/publish-input

      - name: Publish Store release metadata
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/publish-release.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --artifacts-dir "$RUNNER_TEMP/publish-input" \
            --output-dir "$RUNNER_TEMP/release-metadata"

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v6
        with:
          name: store-release-metadata-${{ needs.resolve_plan.outputs.release_tag }}
          path: ${{ runner.temp }}/release-metadata
          if-no-files-found: error

  publish_store:
    name: Publish to Microsoft Store
    needs:
      - resolve_plan
      - build
      - publish
    if: needs.resolve_plan.outputs.should_build == 'true' && needs.resolve_plan.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    env:
      MICROSOFT_STORE_CLIENT_ID: ${{ secrets.CLIENT_ID || secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
      MICROSOFT_STORE_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET || secrets.AZURE_AD_APPLICATION_SECRET }}
      MICROSOFT_STORE_TENANT_ID: ${{ secrets.TENANT_ID || secrets.AZURE_AD_TENANT_ID }}
      MICROSOFT_STORE_SELLER_ID: ${{ secrets.SELLER_ID }}
    steps:
      - name: Checkout win_store_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download resolved build plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan

      - name: Download release metadata
        uses: actions/download-artifact@v8
        with:
          name: store-release-metadata-${{ needs.resolve_plan.outputs.release_tag }}
          path: ${{ runner.temp }}/release-metadata

      - name: Validate Microsoft Store configuration
        shell: bash
        run: |
          missing=()
          for name in MICROSOFT_STORE_CLIENT_ID MICROSOFT_STORE_CLIENT_SECRET MICROSOFT_STORE_TENANT_ID MICROSOFT_STORE_SELLER_ID MICROSOFT_STORE_PRODUCT_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required Microsoft Store configuration: ${missing[*]}" >&2
            exit 1
          fi

      - name: Build Store submission payload
        id: store_payload
        shell: bash
        run: |
          payload_path="$RUNNER_TEMP/store-submission-update.json"
          node scripts/build-store-submission-update.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --release-metadata-dir "$RUNNER_TEMP/release-metadata" \
            --output "$payload_path"

          {
            echo 'product_update<<EOF'
            cat "$payload_path"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Configure Microsoft Store submission
        uses: microsoft/store-submission@v1
        with:
          command: configure
          type: packaged
          seller-id: ${{ env.MICROSOFT_STORE_SELLER_ID }}
          product-id: ${{ env.MICROSOFT_STORE_PRODUCT_ID }}
          tenant-id: ${{ env.MICROSOFT_STORE_TENANT_ID }}
          client-id: ${{ env.MICROSOFT_STORE_CLIENT_ID }}
          client-secret: ${{ env.MICROSOFT_STORE_CLIENT_SECRET }}

      - name: Update draft Store submission
        uses: microsoft/store-submission@v1
        with:
          command: update
          product-update: ${{ steps.store_payload.outputs.product_update }}

      - name: Publish Store submission
        id: publish_store_submission
        uses: microsoft/store-submission@v1
        with:
          command: publish

      - name: Record Store submission
        shell: bash
        run: |
          {
            echo '## Microsoft Store publish queued'
            echo
            echo '- Product ID: '"$MICROSOFT_STORE_PRODUCT_ID"
            echo '- Submission ID: ${{ steps.publish_store_submission.outputs.polling-submission-id }}'
          } >> "$GITHUB_STEP_SUMMARY"

  skip_summary:
    name: Record skipped release
    needs: resolve_plan
    if: needs.resolve_plan.outputs.should_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Emit skip summary
        shell: bash
        run: |
          {
            echo "## win_store_packer build skipped"
            echo
            echo "- Release tag: ${{ needs.resolve_plan.outputs.release_tag }}"
            echo "- should_build: false"
            echo "- The resolve step summary contains the derived skip reason."
          } >> "$GITHUB_STEP_SUMMARY"
