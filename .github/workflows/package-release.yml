name: package-release

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      desktop_version:
        description: 'Optional Desktop release selector. Defaults to the latest eligible Windows Desktop release.'
        required: false
        type: string
      server_version:
        description: 'Optional Server release selector. Defaults to the latest eligible Windows Server release.'
        required: false
        type: string
      force_rebuild:
        description: 'Continue even when the derived Store release tag already exists.'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Build and stage release metadata without publishing to GitHub Releases.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

env:
  RESOLVED_BUILD_PLAN_ARTIFACT_NAME: resolved-build-plan
  DESKTOP_AZURE_SAS_URL: ${{ secrets.desktop_azure_sas_url || secrets.WIN_STORE_PACKER_DESKTOP_AZURE_SAS_URL || secrets.DESKTOP_AZURE_SAS_URL }}
  SERVER_AZURE_SAS_URL: ${{ secrets.server_azure_sas_url || secrets.WIN_STORE_PACKER_SERVER_AZURE_SAS_URL || secrets.SERVER_AZURE_SAS_URL || secrets.SERVICE_AZURE_SAS_URL }}
  HAGISCRIPT_INSTALL_SPEC: '@hagicode/hagiscript@0.2.3'

jobs:
  resolve_plan:
    name: Resolve build plan
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      platform_matrix: ${{ steps.resolve.outputs.platform_matrix }}
    steps:
      - name: Checkout win_store_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install win_store_packer dependencies
        shell: bash
        run: npm ci

      - name: Install global hagiscript
        shell: bash
        run: |
          npm install -g "$HAGISCRIPT_INSTALL_SPEC"

          npm_prefix="$(npm config get prefix)"
          if [ "$RUNNER_OS" = 'Windows' ]; then
            echo "$npm_prefix" >> "$GITHUB_PATH"
            export PATH="$npm_prefix:$PATH"
          else
            echo "$npm_prefix/bin" >> "$GITHUB_PATH"
            export PATH="$npm_prefix/bin:$PATH"
          fi

          hagiscript --version

      - name: Resolve build plan
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WIN_STORE_PACKER_DESKTOP_AZURE_SAS_URL: ${{ env.DESKTOP_AZURE_SAS_URL }}
          WIN_STORE_PACKER_SERVER_AZURE_SAS_URL: ${{ env.SERVER_AZURE_SAS_URL }}
        run: |
          mkdir -p "$RUNNER_TEMP/build-plan"
          node scripts/resolve-dispatch-build-plan.mjs \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$GITHUB_EVENT_PATH" \
            --output "$RUNNER_TEMP/build-plan/build-plan.json"

      - name: Validate build plan
        id: resolve
        shell: bash
        run: |
          node scripts/resolve-release-plan.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json"

      - name: Upload resolved build plan
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan/build-plan.json
          if-no-files-found: error

  build:
    name: Build ${{ matrix.target.platform }} ${{ matrix.variant }}
    needs: resolve_plan
    if: needs.resolve_plan.outputs.should_build == 'true'
    permissions:
      contents: read
      actions: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.resolve_plan.outputs.platform_matrix).include }}
        variant:
          - unsigned
          - signed
    runs-on: ${{ matrix.target.runner }}
    steps:
      - name: Checkout win_store_packer
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout hagicode-desktop input
        uses: actions/checkout@v5
        with:
          repository: HagiCode-org/desktop
          path: inputs/hagicode-desktop
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install win_store_packer dependencies
        shell: bash
        run: npm ci

      - name: Install global hagiscript
        shell: bash
        run: |
          npm install -g "$HAGISCRIPT_INSTALL_SPEC"

          npm_prefix="$(npm config get prefix)"
          if [ "$RUNNER_OS" = 'Windows' ]; then
            echo "$npm_prefix" >> "$GITHUB_PATH"
            export PATH="$npm_prefix:$PATH"
          else
            echo "$npm_prefix/bin" >> "$GITHUB_PATH"
            export PATH="$npm_prefix/bin:$PATH"
          fi

          hagiscript --version

      - name: Download resolved build plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan

      - name: Determine signing mode
        shell: bash
        run: |
          if [ "${{ matrix.variant }}" = 'signed' ]; then
            echo "STORE_WORKSPACE=$RUNNER_TEMP/store-release-${{ matrix.target.platform }}-signed" >> "$GITHUB_ENV"
            echo "STORE_REQUIRE_SIGNED=true" >> "$GITHUB_ENV"
            echo 'STORE_SIGNING_MODE=external' >> "$GITHUB_ENV"
          else
            echo "STORE_WORKSPACE=$RUNNER_TEMP/store-release-${{ matrix.target.platform }}-unsigned" >> "$GITHUB_ENV"
            echo 'STORE_SIGNING_MODE=disabled' >> "$GITHUB_ENV"
            echo 'STORE_REQUIRE_SIGNED=false' >> "$GITHUB_ENV"
          fi

      - name: Validate external signing configuration
        if: success() && matrix.variant == 'signed'
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CODESIGN_ENDPOINT: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          AZURE_CODESIGN_ACCOUNT_NAME: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
          WINDOWS_PACKAGE_PUBLISHER: ${{ secrets.WINDOWS_PACKAGE_PUBLISHER }}
        run: |
          missing=()
          for key in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_CODESIGN_ENDPOINT AZURE_CODESIGN_ACCOUNT_NAME AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME WINDOWS_PACKAGE_PUBLISHER; do
            if [ -z "${!key:-}" ]; then
              missing+=("${key}")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            printf '::error::Missing external signing configuration: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

      - name: Prepare tagged desktop workspace
        shell: bash
        run: |
          node scripts/prepare-packaging-workspace.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.target.platform }}" \
            --workspace "$STORE_WORKSPACE" \
            --desktop-source "$GITHUB_WORKSPACE/inputs/hagicode-desktop"

      - name: Download and inject server payload
        shell: bash
        env:
          WIN_STORE_PACKER_SERVER_AZURE_SAS_URL: ${{ env.SERVER_AZURE_SAS_URL }}
        run: |
          node scripts/stage-server-payload.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.target.platform }}" \
            --workspace "$STORE_WORKSPACE"

      - name: Install desktop workspace dependencies
        shell: bash
        run: |
          cd "$STORE_WORKSPACE/extracted/desktop"
          npm ci

      - name: Build Store package
        shell: bash
        env:
          WIN_STORE_PACKER_SKIP_DESKTOP_NPM_CI: '1'
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || secrets.CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || secrets.TENANT_ID || secrets.AZURE_AD_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET || secrets.CLIENT_SECRET || secrets.AZURE_AD_APPLICATION_SECRET }}
          AZURE_CODESIGN_APPX_PUBLISHER: ${{ secrets.AZURE_CODESIGN_APPX_PUBLISHER || secrets.WINDOWS_PACKAGE_PUBLISHER }}
          AZURE_CODESIGN_ENDPOINT: ${{ vars.AZURE_CODESIGN_ENDPOINT || secrets.AZURE_CODESIGN_ENDPOINT }}
          AZURE_CODESIGN_ACCOUNT_NAME: ${{ vars.AZURE_CODESIGN_ACCOUNT_NAME || secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME || secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
        run: |
          node scripts/build-appx.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.target.platform }}" \
            --workspace "$STORE_WORKSPACE" \
            --artifact-variant "${{ matrix.variant }}" \
            --signing-mode "$STORE_SIGNING_MODE"

      - name: Azure login for external signing
        if: success() && matrix.variant == 'signed'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Collect Windows package catalog
        if: success() && matrix.variant == 'signed'
        id: msix_catalog
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseDir = Join-Path $env:STORE_WORKSPACE 'release-assets'
          $catalogPath = Join-Path $env:STORE_WORKSPACE 'windows-signable-artifacts.txt'
          $files = @(Get-ChildItem -LiteralPath $releaseDir -File | Where-Object { $_.Extension -in '.msix', '.appx' } | Sort-Object FullName -Unique)

          if ($files.Count -eq 0) {
            throw 'No packaged Store artifacts were found for signing.'
          }

          $files | ForEach-Object { $_.FullName } | Set-Content -Path $catalogPath

          Add-Content -Path $env:GITHUB_OUTPUT -Value "catalog_path=$catalogPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value 'package_files<<EOF'
          $files | ForEach-Object { Add-Content -Path $env:GITHUB_OUTPUT -Value $_.FullName }
          Add-Content -Path $env:GITHUB_OUTPUT -Value 'EOF'

      - name: Sign MSIX artifacts with Artifact Signing
        if: success() && matrix.variant == 'signed'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
          files-catalog: ${{ steps.msix_catalog.outputs.catalog_path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          cache-dependencies: true

      - name: Finalize Store package metadata
        shell: bash
        run: |
          args=(
            --workspace "$STORE_WORKSPACE"
            --platform "${{ matrix.target.platform }}"
            --artifact-variant "${{ matrix.variant }}"
          )

          if [ "$STORE_REQUIRE_SIGNED" = 'true' ]; then
            args+=(--require-signed)
          fi

          node scripts/finalize-appx-signing.mjs "${args[@]}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: store-package-${{ matrix.target.platform }}-${{ matrix.variant }}
          path: |
            ${{ env.STORE_WORKSPACE }}/artifact-inventory-${{ matrix.target.platform }}-${{ matrix.variant }}.json
            ${{ env.STORE_WORKSPACE }}/build-metadata-${{ matrix.target.platform }}-${{ matrix.variant }}.json
            ${{ env.STORE_WORKSPACE }}/payload-validation-${{ matrix.target.platform }}.json
            ${{ env.STORE_WORKSPACE }}/workspace-validation-${{ matrix.target.platform }}.json
            ${{ env.STORE_WORKSPACE }}/release-assets
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs:
      - resolve_plan
      - build
    if: needs.resolve_plan.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout win_store_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install win_store_packer dependencies
        shell: bash
        run: npm ci

      - name: Download resolved build plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: store-package-*
          merge-multiple: true
          path: ${{ runner.temp }}/publish-input

      - name: Publish release and metadata
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/publish-release.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --artifacts-dir "$RUNNER_TEMP/publish-input" \
            --output-dir "$RUNNER_TEMP/release-metadata"

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v6
        with:
          name: store-release-metadata-${{ needs.resolve_plan.outputs.release_tag }}
          path: ${{ runner.temp }}/release-metadata
          if-no-files-found: error

  skip_summary:
    name: Record skipped release
    needs: resolve_plan
    if: needs.resolve_plan.outputs.should_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Emit skip summary
        shell: bash
        run: |
          {
            echo "## win_store_packer build skipped"
            echo
            echo "- Release tag: ${{ needs.resolve_plan.outputs.release_tag }}"
            echo "- should_build: false"
            echo "- The resolve step summary contains the derived skip reason."
          } >> "$GITHUB_STEP_SUMMARY"
