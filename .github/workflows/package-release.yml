name: package-release

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      desktop_version:
        description: 'Optional Desktop release selector. Defaults to the latest eligible Windows Desktop release.'
        required: false
        type: string
      server_version:
        description: 'Optional Server release selector. Defaults to the latest eligible Windows Server release.'
        required: false
        type: string
      force_rebuild:
        description: 'Continue even when the derived Store release tag already exists.'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Build and stage release metadata without publishing to GitHub Releases.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

env:
  RESOLVED_BUILD_PLAN_ARTIFACT_NAME: resolved-build-plan
  DESKTOP_AZURE_SAS_URL: ${{ secrets.desktop_azure_sas_url || secrets.WIN_STORE_PACKER_DESKTOP_AZURE_SAS_URL || secrets.DESKTOP_AZURE_SAS_URL }}
  SERVER_AZURE_SAS_URL: ${{ secrets.server_azure_sas_url || secrets.WIN_STORE_PACKER_SERVER_AZURE_SAS_URL || secrets.SERVER_AZURE_SAS_URL || secrets.SERVICE_AZURE_SAS_URL }}

jobs:
  resolve_plan:
    name: Resolve build plan
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      platform_matrix: ${{ steps.resolve.outputs.platform_matrix }}
    steps:
      - name: Checkout win_store_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Resolve build plan
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WIN_STORE_PACKER_DESKTOP_AZURE_SAS_URL: ${{ env.DESKTOP_AZURE_SAS_URL }}
          WIN_STORE_PACKER_SERVER_AZURE_SAS_URL: ${{ env.SERVER_AZURE_SAS_URL }}
        run: |
          mkdir -p "$RUNNER_TEMP/build-plan"
          node scripts/resolve-dispatch-build-plan.mjs \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$GITHUB_EVENT_PATH" \
            --output "$RUNNER_TEMP/build-plan/build-plan.json"

      - name: Validate build plan
        id: resolve
        shell: bash
        run: |
          node scripts/resolve-release-plan.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json"

      - name: Upload resolved build plan
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan/build-plan.json
          if-no-files-found: error

  build:
    name: Build ${{ matrix.platform }}
    needs: resolve_plan
    if: needs.resolve_plan.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve_plan.outputs.platform_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout win_store_packer and desktop input
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download resolved build plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan

      - name: Prepare tagged desktop workspace
        shell: bash
        run: |
          node scripts/prepare-packaging-workspace.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/store-release-${{ matrix.platform }}" \
            --desktop-source "$GITHUB_WORKSPACE/inputs/hagicode-desktop"

      - name: Download and inject server payload
        shell: bash
        env:
          WIN_STORE_PACKER_SERVER_AZURE_SAS_URL: ${{ env.SERVER_AZURE_SAS_URL }}
        run: |
          node scripts/stage-server-payload.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/store-release-${{ matrix.platform }}"

      - name: Build AppX
        shell: bash
        run: |
          node scripts/build-appx.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --platform "${{ matrix.platform }}" \
            --workspace "$RUNNER_TEMP/store-release-${{ matrix.platform }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: store-package-${{ matrix.platform }}
          path: |
            ${{ runner.temp }}/store-release-${{ matrix.platform }}/artifact-inventory-${{ matrix.platform }}.json
            ${{ runner.temp }}/store-release-${{ matrix.platform }}/build-metadata-${{ matrix.platform }}.json
            ${{ runner.temp }}/store-release-${{ matrix.platform }}/payload-validation-${{ matrix.platform }}.json
            ${{ runner.temp }}/store-release-${{ matrix.platform }}/workspace-validation-${{ matrix.platform }}.json
            ${{ runner.temp }}/store-release-${{ matrix.platform }}/release-assets
          if-no-files-found: error

  publish:
    name: Publish release
    needs:
      - resolve_plan
      - build
    if: needs.resolve_plan.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout win_store_packer
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download resolved build plan
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RESOLVED_BUILD_PLAN_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/build-plan

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: store-package-*
          merge-multiple: true
          path: ${{ runner.temp }}/publish-input

      - name: Publish AppX release metadata
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/publish-release.mjs \
            --plan "$RUNNER_TEMP/build-plan/build-plan.json" \
            --artifacts-dir "$RUNNER_TEMP/publish-input" \
            --output-dir "$RUNNER_TEMP/release-metadata"

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v6
        with:
          name: store-release-metadata-${{ needs.resolve_plan.outputs.release_tag }}
          path: ${{ runner.temp }}/release-metadata
          if-no-files-found: error

  skip_summary:
    name: Record skipped release
    needs: resolve_plan
    if: needs.resolve_plan.outputs.should_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Emit skip summary
        shell: bash
        run: |
          {
            echo "## win_store_packer build skipped"
            echo
            echo "- Release tag: ${{ needs.resolve_plan.outputs.release_tag }}"
            echo "- should_build: false"
            echo "- The resolve step summary contains the derived skip reason."
          } >> "$GITHUB_STEP_SUMMARY"
